name: Build SimpMusic Android TV
run-name: Build SimpMusic Android TV ${{ github.ref_name || github.event.inputs.tag_version }}

on:
  workflow_dispatch:
    inputs:
      tag_version:
        description: 'Tag versi SimpMusic yang mau di-build'
        required: true
        default: 'v1.1.1'
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Sign APK TV
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Tentukan Versi Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag_version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
          echo "Building version: $(cat $GITHUB_OUTPUT)"

      - name: Ambil Kode Sumber SimpMusic
        uses: actions/checkout@v4
        with:
          repository: maxrave-dev/SimpMusic
          ref: ${{ steps.get_tag.outputs.TAG }}
          submodules: recursive
          fetch-depth: 1

      - name: Siapkan JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Atur Izin Gradle
        run: chmod +x ./gradlew

      - name: Patch Manifest untuk Android TV
        run: |
          # 1. Tambahkan fitur leanback & non-touchscreen
          sed -i '/<\/manifest>/i \
          <uses-feature android:name="android.software.leanback" android:required="false" />\n\
          <uses-feature android:name="android.hardware.touchscreen" android:required="false" />' \
          androidApp/src/main/AndroidManifest.xml

          # 2. Tambahkan banner + isGame=false
          sed -i '/<application/ s/android:icon/android:banner="@mipmap\/ic_launcher" android:isGame="false" android:icon/' \
          androidApp/src/main/AndroidManifest.xml

          # 3. Tambah LEANBACK_LAUNCHER ke MainActivity
          sed -i '/android.intent.category.LAUNCHER/a \
          <category android:name="android.intent.category.LEANBACK_LAUNCHER" />' \
          androidApp/src/main/AndroidManifest.xml

          # 4. Nama app khusus TV
          cat >> androidApp/build.gradle.kts << 'EOF'

          android {
              defaultConfig {
                  resValue("string", "app_name_tv", "SimpMusic TV")
              }
          }
          EOF

      - name: Build APK Release
        run: ./gradlew :androidApp:assembleRelease --no-build-cache --stacktrace

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SimpMusic-TV-${{ steps.get_tag.outputs.TAG }}
          path: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            androidApp/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Buat GitHub Release
        if: steps.sign_app.outcome == 'success' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          tag_name: SimpMusic-TV-${{ steps.get_tag.outputs.TAG }}
          name: SimpMusic Android TV ${{ steps.get_tag.outputs.TAG }}
          body: |
            ### SimpMusic untuk Android TV / Google TV
            
            **Base Version:** `${{ steps.get_tag.outputs.TAG }}` dari [maxrave-dev/SimpMusic](https://github.com/maxrave-dev/SimpMusic)
            
            **Patch TV:**
            - Leanback Launcher: Muncul di Home Screen TV
            - Banner support: Tidak masuk kategori Game
            - `touchscreen=false`: Optimal untuk remote D-Pad
            - Signed APK: Siap install & update
            
            **Install:** Sideload APK ke Android TV 9+
            **Bug D-Pad?** App ini belum full TV-compose. Perlu patch `.focusable()` manual.
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
